<!--
  Offline fallback page for the Bosch Car Service PWA.
  Served by the service worker (public/sw.js) when a navigation request fails
  because the device has no network connection. Kept fully self-contained (no
  external assets) so it renders even while offline.
-->
<!doctype html>
<html lang="pt-PT">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#E20015" />
    <title>Sem ligação — Bosch Car Service</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1rem;
        padding: 2rem;
        text-align: center;
        font-family:
          system-ui,
          -apple-system,
          "Segoe UI",
          Roboto,
          sans-serif;
        color: #1a1a1a;
        background: #ffffff;
      }
      img {
        width: 96px;
        height: 96px;
      }
      h1 {
        margin: 0;
        font-size: 1.25rem;
      }
      p {
        margin: 0;
        max-width: 28rem;
        color: #555;
      }
      button {
        margin-top: 0.5rem;
        padding: 0.75rem 1.5rem;
        font-size: 1rem;
        font-weight: 600;
        color: #ffffff;
        background: #e20015;
        border: none;
        border-radius: 0.5rem;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <img src="/icons/icon-192x192.png" alt="Bosch Car Service" />
    <h1>Sem ligação à Internet</h1>
    <p>
      Não foi possível carregar esta página. Verifique a sua ligação e tente
      novamente.
    </p>
    <button onclick="location.reload()">Tentar novamente</button>
  </body>
</html>
